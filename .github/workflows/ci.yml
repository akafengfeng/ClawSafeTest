name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        # Pinned so a new ruff release can't fail CI on a rule that wasn't
        # present when the code was written. Bump deliberately.
        run: pip install "ruff==0.15.20"
      - name: Ruff check
        run: ruff check clawsafe/ tests/ benchmarks/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Security benchmark (L1 static + L2 multi-turn)
        run: python benchmarks/run_benchmark.py --level all

      - name: Token budget smoke check
        run: |
          python - <<'EOF'
          from clawsafe.utils.token_budget import TokenBudget
          b = TokenBudget(0.05)
          b.record_main(1000)
          b.record_security("test", 40)
          assert b.is_within_budget(), f"Budget exceeded: {b.summary()}"
          print("Budget check passed:", b.summary())
          EOF
