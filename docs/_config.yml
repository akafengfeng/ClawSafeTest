# GitHub Pages Configuration for ClawSafe

title: ClawSafe
description: Multi-provider security framework for LLMs
baseurl: /ClawSafeTest
url: https://akafengfeng.github.io/ClawSafeTest

# Theme (using Slate as base, overridden with custom CSS)
theme: jekyll-theme-slate

# Header settings
show_downloads: false
github_is_project_page: true
github_repository_url: https://github.com/akafengfeng/ClawSafeTest

# Markdown
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# Assets
sass:
  style: compressed

# Exclude from processing
exclude:
  - .github
  - tests
  - clawsafe
  - .gitignore
  - CONTRIBUTING.md
  - CODE_OF_CONDUCT.md
  - CHANGELOG.md
