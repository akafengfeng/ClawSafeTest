<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Framework integration topology: OpenClaw, Hermes Agent, LangChain, CrewAI, and custom frameworks all route tool calls through the central ClawSafe AgentGuard, which returns verdicts.">
  <defs>
    <style>
      .fw { fill: #1a1f3a; stroke: #00d9ff; stroke-width: 1.5; }
      .fw-title { font: 700 15px 'Inter', -apple-system, 'Segoe UI', sans-serif; fill: #e8f0fe; text-anchor: middle; }
      .fw-sub { font: 400 10.5px 'Inter', -apple-system, 'Segoe UI', sans-serif; fill: #7a8ab0; text-anchor: middle; }
      .fw-preset { font: 600 10.5px 'JetBrains Mono', 'SF Mono', Consolas, monospace; fill: #00ff88; text-anchor: middle; }
      .core-title { font: 800 19px 'Inter', -apple-system, 'Segoe UI', sans-serif; fill: #00d9ff; text-anchor: middle; }
      .core-item { font: 500 12px 'Inter', -apple-system, 'Segoe UI', sans-serif; fill: #a0b0d4; text-anchor: middle; }
      .edge { stroke: #00d9ff; stroke-width: 1.5; fill: none; opacity: 0.6; }
      .edge-label { font: 500 10px 'Inter', -apple-system, 'Segoe UI', sans-serif; fill: #7a8ab0; }
      .title { font: 800 22px 'Inter', -apple-system, 'Segoe UI', sans-serif; fill: #00d9ff; text-anchor: middle; }
      .subtitle { font: 500 13px 'Inter', -apple-system, 'Segoe UI', sans-serif; fill: #a0b0d4; text-anchor: middle; }
    </style>
    <marker id="fi-arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00d9ff"/>
    </marker>
  </defs>

  <rect width="900" height="560" fill="#0a0e27"/>

  <text x="450" y="38" class="title">One Guard. Every Framework.</text>
  <text x="450" y="60" class="subtitle">Adapters intercept each framework's tool execution and route it through the same security core</text>

  <!-- edges (drawn first, under boxes) -->
  <path d="M 262 132 L 352 210" class="edge" marker-end="url(#fi-arrow)"/>
  <path d="M 638 132 L 548 210" class="edge" marker-end="url(#fi-arrow)"/>
  <path d="M 262 448 L 352 370" class="edge" marker-end="url(#fi-arrow)"/>
  <path d="M 638 448 L 548 370" class="edge" marker-end="url(#fi-arrow)"/>
  <path d="M 450 460 L 450 392" class="edge" marker-end="url(#fi-arrow)"/>

  <text x="252" y="168" class="edge-label">tool calls ⇄ verdicts</text>
  <text x="558" y="168" class="edge-label" text-anchor="end">tool calls ⇄ verdicts</text>
  <text x="252" y="416" class="edge-label">tool calls ⇄ verdicts</text>
  <text x="558" y="416" class="edge-label" text-anchor="end">tool calls ⇄ verdicts</text>

  <!-- core -->
  <rect x="330" y="210" width="240" height="182" rx="14" fill="#101736" stroke="#00d9ff" stroke-width="2.5"/>
  <text x="450" y="242" class="core-title">🛡️ AgentGuard</text>
  <line x1="356" y1="254" x2="544" y2="254" stroke="#3a4555" stroke-width="1"/>
  <text x="450" y="276" class="core-item">Authorize · RBAC + risk</text>
  <text x="450" y="296" class="core-item">Whitelist · deny by default</text>
  <text x="450" y="316" class="core-item">Validate · injection + paths</text>
  <text x="450" y="336" class="core-item">Rate limit · per user × tool</text>
  <text x="450" y="356" class="core-item">Sanitize · recursive redaction</text>
  <text x="450" y="376" class="core-item">Audit · every verdict logged</text>

  <!-- OpenClaw -->
  <rect x="60" y="84" width="230" height="88" rx="10" class="fw"/>
  <text x="175" y="110" class="fw-title">OpenClaw</text>
  <text x="175" y="128" class="fw-sub">execute_tool interception · skill manifest</text>
  <text x="175" y="152" class="fw-preset">secure_openclaw_adapter()</text>

  <!-- Hermes -->
  <rect x="610" y="84" width="230" height="88" rx="10" class="fw"/>
  <text x="725" y="110" class="fw-title">Hermes Agent</text>
  <text x="725" y="128" class="fw-sub">hooks · plugin entry point · memory provider</text>
  <text x="725" y="152" class="fw-preset">secure_hermes_adapter()</text>

  <!-- LangChain -->
  <rect x="60" y="428" width="230" height="76" rx="10" class="fw"/>
  <text x="175" y="456" class="fw-title">LangChain</text>
  <text x="175" y="476" class="fw-sub">tool-executor replacement · LangChainAdapter</text>

  <!-- CrewAI -->
  <rect x="610" y="428" width="230" height="76" rx="10" class="fw"/>
  <text x="725" y="456" class="fw-title">CrewAI</text>
  <text x="725" y="476" class="fw-sub">per-agent wrapping · CrewAIAdapter</text>

  <!-- Custom -->
  <rect x="345" y="460" width="210" height="64" rx="10" class="fw" stroke-dasharray="6 4"/>
  <text x="450" y="486" class="fw-title">Your Framework</text>
  <text x="450" y="504" class="fw-sub">subclass BaseAgentAdapter</text>
</svg>
