<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 1100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <style>
      .layer { fill: #1a1f3a; stroke: #00d9ff; stroke-width: 2; }
      .layer-title { font-size: 14px; font-weight: bold; fill: #00d9ff; }
      .layer-text { font-size: 12px; fill: #a0b0d4; }
      .attack { fill: #ff3333; opacity: 0.3; }
      .bypass-text { font-size: 10px; fill: #ff3333; font-weight: bold; }
      .title-text { font-size: 24px; font-weight: bold; fill: #00d9ff; }
      .subtitle { font-size: 12px; fill: #a0b0d4; }
    </style>
  </defs>

  <rect width="1000" height="1100" fill="#0a0e27"/>

  <!-- Title -->
  <text x="500" y="50" text-anchor="middle" class="title-text">
    ClawSafe Defense-in-Depth: 8 Independent Security Layers
  </text>

  <!-- Outer perimeter attack illustration -->
  <circle cx="500" cy="500" r="350" fill="none" stroke="#ff3333" stroke-width="2" stroke-dasharray="5,5" opacity="0.3"/>
  <text x="150" y="200" class="bypass-text">Attacker outside all layers</text>

  <!-- Layer 1: Authorization (outermost) -->
  <g>
    <rect x="100" y="180" width="800" height="80" rx="8" class="layer"/>
    <text x="500" y="205" text-anchor="middle" class="layer-title">Layer 1: Authorization Check</text>
    <text x="120" y="230" class="layer-text">✓ User authenticated (verify identity)</text>
    <text x="120" y="250" class="layer-text">✓ User role permitted (RBAC)</text>
    <text x="650" y="230" class="layer-text">✓ Risk acceptable (risk scoring)</text>
    <text x="820" y="230" font-size="11" fill="#ff3333" font-weight="bold">If bypassed: Layers 2-8 still protect</text>
  </g>

  <!-- Layer 2: Tool Registry -->
  <g>
    <rect x="120" y="280" width="760" height="75" rx="8" class="layer"/>
    <text x="500" y="302" text-anchor="middle" class="layer-title">Layer 2: Tool Registry Validation</text>
    <text x="140" y="325" class="layer-text">✓ Tool in whitelist? (approved tools only)</text>
    <text x="140" y="343" class="layer-text">✓ Not blacklisted?</text>
    <text x="520" y="325" class="layer-text">✓ Parameters match schema?</text>
  </g>

  <!-- Layer 3: Parameter Validation -->
  <g>
    <rect x="140" y="370" width="720" height="70" rx="8" class="layer"/>
    <text x="500" y="391" text-anchor="middle" class="layer-title">Layer 3: Parameter Type Validation</text>
    <text x="160" y="413" class="layer-text">✓ Type checking (int, str, dict)</text>
    <text x="160" y="431" class="layer-text">✓ Length validation</text>
    <text x="500" y="413" class="layer-text">✓ Format validation</text>
    <text x="500" y="431" class="layer-text">✓ Schema compliance</text>
  </g>

  <!-- Layer 4: Input Scanning -->
  <g>
    <rect x="160" y="455" width="680" height="80" rx="8" class="layer"/>
    <text x="500" y="477" text-anchor="middle" class="layer-title">Layer 4: Input Injection Scanning</text>
    <text x="180" y="500" class="layer-text">✓ Command injection (;|&amp;$`) • ✓ SQL injection (UNION SELECT DROP)</text>
    <text x="180" y="520" class="layer-text">✓ Path traversal (../) • ✓ Credential detection (API keys)</text>
  </g>

  <!-- Layer 5: Rate Limiting -->
  <g>
    <rect x="180" y="550" width="640" height="70" rx="8" class="layer"/>
    <text x="500" y="571" text-anchor="middle" class="layer-title">Layer 5: Rate Limiting</text>
    <text x="200" y="593" class="layer-text">✓ Per-tool quota enforcement</text>
    <text x="200" y="611" class="layer-text">✓ Per-user rate limiting (prevents DOS)</text>
    <text x="650" y="593" class="layer-text">Attacks blocked: 100+ calls/min</text>
  </g>

  <!-- Layer 6: Execution (core) -->
  <g>
    <rect x="200" y="635" width="600" height="60" rx="8" fill="#00ff88" opacity="0.15" stroke="#00ff88" stroke-width="2"/>
    <text x="500" y="658" text-anchor="middle" style="font-size: 14px; font-weight: bold; fill: #00ff88;">
      Layer 6: EXECUTE TOOL (Protected Core)
    </text>
    <text x="220" y="685" style="font-size: 11px; fill: #00ff88;">
      ✓ Run the actual tool function
    </text>
  </g>

  <!-- Layer 7: Output Validation -->
  <g>
    <rect x="200" y="715" width="600" height="70" rx="8" class="layer"/>
    <text x="500" y="736" text-anchor="middle" class="layer-title">Layer 7: Output Validation</text>
    <text x="220" y="758" class="layer-text">✓ Response schema verification</text>
    <text x="220" y="776" class="layer-text">✓ Credential leak detection (scan for API keys)</text>
    <text x="620" y="758" class="layer-text">✓ Error checking</text>
  </g>

  <!-- Layer 8: Audit Logging -->
  <g>
    <rect x="180" y="800" width="640" height="75" rx="8" class="layer"/>
    <text x="500" y="822" text-anchor="middle" class="layer-title">Layer 8: Immutable Audit Logging</text>
    <text x="200" y="845" class="layer-text">✓ Record every tool call (user, params, result)</text>
    <text x="200" y="863" class="layer-text">✓ Record all findings (severity, message)</text>
    <text x="620" y="845" class="layer-text">✓ Enable forensics</text>
  </g>

  <!-- Attack success probability -->
  <rect x="100" y="910" width="800" height="140" rx="8" fill="#1a1f3a" stroke="#00d9ff" stroke-width="2" opacity="0.9"/>

  <text x="500" y="935" text-anchor="middle" style="font-size: 14px; font-weight: bold; fill: #00d9ff;">
    Attack Success Probability
  </text>

  <g style="font-size: 12px; fill: #a0b0d4;">
    <text x="120" y="965">Single Layer Protection:</text>
    <rect x="120" y="975" width="150" height="20" fill="#ff3333" opacity="0.5"/>
    <text x="280" y="990">50% success rate (HIGH RISK)</text>

    <text x="120" y="1020">Four Layer Protection:</text>
    <rect x="120" y="1030" width="30" height="20" fill="#ffaa00" opacity="0.7"/>
    <text x="160" y="1045">6% success rate (Medium risk)</text>

    <text x="500" y="1020">Eight Layer Protection (ClawSafe):</text>
    <rect x="500" y="1030" width="10" height="20" fill="#00ff88" opacity="0.8"/>
    <text x="520" y="1045">0.4% success rate (ENTERPRISE-GRADE)</text>
  </g>

  <!-- Legend -->
  <text x="120" y="1090" style="font-size: 10px; fill: #7a8ab0; font-style: italic;">
    Each layer is independent. Adversary must bypass ALL 8 layers to succeed. Single layer compromise ≠ total failure.
  </text>
</svg>
