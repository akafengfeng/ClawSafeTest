<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1200 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <style>
      .decision-box { fill: #1a1f3a; stroke: #00d9ff; stroke-width: 2; }
      .decision-diamond { fill: #1a1f3a; stroke: #ffaa00; stroke-width: 2; }
      .allowed-box { fill: #00ff88; opacity: 0.2; stroke: #00ff88; stroke-width: 2; }
      .denied-box { fill: #ff3333; opacity: 0.2; stroke: #ff3333; stroke-width: 2; }
      .text { fill: #a0b0d4; font-size: 12px; }
      .title { fill: #00d9ff; font-size: 14px; font-weight: bold; }
      .label { fill: #e8f0fe; font-size: 11px; font-weight: bold; }
      .arrow { stroke: #00d9ff; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-deny { stroke: #ff3333; stroke-width: 2; fill: none; marker-end: url(#arrowhead-deny); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#00d9ff" />
    </marker>
    <marker id="arrowhead-deny" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ff3333" />
    </marker>
  </defs>

  <rect width="1200" height="1000" fill="#0a0e27"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" style="font-size: 24px; font-weight: bold; fill: #00d9ff;">
    ClawSafe Authorization Decision Framework
  </text>

  <!-- Start -->
  <circle cx="600" cy="100" r="25" fill="#00d9ff" opacity="0.3" stroke="#00d9ff" stroke-width="2"/>
  <text x="600" y="105" text-anchor="middle" class="label">Request</text>

  <path d="M 600 125 L 600 160" class="arrow"/>

  <!-- Step 1: Authentication -->
  <polygon points="600,160 700,200 600,240 500,200" class="decision-diamond"/>
  <text x="600" y="200" text-anchor="middle" class="label">Identity verified?</text>

  <path d="M 500 200 L 350 200" class="arrow-deny"/>
  <rect x="200" y="175" width="140" height="50" rx="5" class="denied-box"/>
  <text x="270" y="195" text-anchor="middle" class="label">DENY</text>
  <text x="270" y="215" text-anchor="middle" class="text">(Unknown user)</text>

  <path d="M 600 240 L 600 280" class="arrow"/>
  <text x="620" y="265" class="label">YES</text>

  <!-- Step 2: Authorization -->
  <polygon points="600,280 700,320 600,360 500,320" class="decision-diamond"/>
  <text x="600" y="315" text-anchor="middle" class="label">User role</text>
  <text x="600" y="333" text-anchor="middle" class="label">permitted?</text>

  <path d="M 500 320 L 350 320" class="arrow-deny"/>
  <rect x="200" y="295" width="140" height="50" rx="5" class="denied-box"/>
  <text x="270" y="315" text-anchor="middle" class="label">DENY</text>
  <text x="270" y="335" text-anchor="middle" class="text">(Insufficient perms)</text>

  <path d="M 600 360 L 600 400" class="arrow"/>
  <text x="620" y="385" class="label">YES</text>

  <!-- Step 3: Tool Approved -->
  <polygon points="600,400 700,440 600,480 500,440" class="decision-diamond"/>
  <text x="600" y="435" text-anchor="middle" class="label">Tool approved</text>
  <text x="600" y="453" text-anchor="middle" class="label">(whitelisted)?</text>

  <path d="M 500 440 L 350 440" class="arrow-deny"/>
  <rect x="200" y="415" width="140" height="50" rx="5" class="denied-box"/>
  <text x="270" y="435" text-anchor="middle" class="label">DENY</text>
  <text x="270" y="455" text-anchor="middle" class="text">(Tool blocked)</text>

  <path d="M 600 480 L 600 520" class="arrow"/>
  <text x="620" y="505" class="label">YES</text>

  <!-- Step 4: Risk Assessment -->
  <rect x="450" y="520" width="300" height="100" rx="5" class="decision-box"/>
  <text x="600" y="545" text-anchor="middle" class="title">Risk Scoring</text>
  <text x="470" y="565" class="text">Score = (User Role × 0.3) +</text>
  <text x="470" y="583" class="text">(Tool Risk × 0.4) +</text>
  <text x="470" y="601" class="text">(Parameter Sensitivity × 0.3)</text>

  <path d="M 600 620 L 600 660" class="arrow"/>

  <!-- Decision Diamond for Risk Score -->
  <polygon points="600,660 700,700 600,740 500,700" class="decision-diamond"/>
  <text x="600" y="705" text-anchor="middle" class="label">Risk Score</text>

  <!-- Low Risk -->
  <path d="M 500 700 L 280 700" class="arrow"/>
  <text x="390" y="690" class="label">0.0-0.3</text>
  <rect x="100" y="660" width="160" height="80" rx="5" class="allowed-box"/>
  <text x="180" y="690" text-anchor="middle" class="label">✓ ALLOWED</text>
  <text x="180" y="710" text-anchor="middle" class="text" style="fill: #00ff88;">(Low Risk)</text>
  <text x="180" y="728" text-anchor="middle" class="text" style="fill: #00ff88;">Execute immediately</text>

  <!-- Medium Risk -->
  <path d="M 600 740 L 600 780" class="arrow"/>
  <text x="620" y="760" class="label">0.3-0.7</text>
  <rect x="450" y="780" width="300" height="80" rx="5" fill="#ffaa00" opacity="0.2" stroke="#ffaa00" stroke-width="2"/>
  <text x="600" y="810" text-anchor="middle" class="label" style="fill: #ffaa00;">⚠ CONDITIONAL</text>
  <text x="600" y="828" text-anchor="middle" class="text" style="fill: #ffaa00;">May require approval or pre-approval</text>

  <!-- High Risk -->
  <path d="M 700 700 L 920 700" class="arrow"/>
  <text x="810" y="690" class="label">0.7-1.0</text>
  <rect x="840" y="660" width="160" height="80" rx="5" class="denied-box"/>
  <text x="920" y="690" text-anchor="middle" class="label" style="fill: #ff3333;">✗ DENIED</text>
  <text x="920" y="710" text-anchor="middle" class="text" style="fill: #ff3333;">(High Risk)</text>
  <text x="920" y="728" text-anchor="middle" class="text" style="fill: #ff3333;">Block execution</text>

  <!-- Final Decision -->
  <rect x="350" y="900" width="500" height="70" rx="5" class="decision-box"/>
  <text x="600" y="925" text-anchor="middle" class="title">Authorization Decision</text>
  <text x="600" y="950" text-anchor="middle" class="text">Log decision + reason in audit trail</text>
  <text x="600" y="965" text-anchor="middle" class="text">Alert on suspicious patterns</text>

  <!-- Role/Risk Legend -->
  <rect x="50" y="50" width="300" height="150" rx="5" fill="#1a1f3a" stroke="#00d9ff" stroke-width="1" opacity="0.8"/>
  <text x="200" y="75" text-anchor="middle" class="title">User Roles</text>
  <text x="70" y="100" class="text">ADMIN: Can call all tools</text>
  <text x="70" y="120" class="text">USER: Can call LOW/MEDIUM</text>
  <text x="70" y="140" class="text">GUEST: Can call LOW only</text>
  <text x="70" y="160" class="text">TOOL RISK: LOW/MEDIUM/HIGH/CRITICAL</text>
  <text x="70" y="180" class="text">Combination determines risk score</text>
</svg>
