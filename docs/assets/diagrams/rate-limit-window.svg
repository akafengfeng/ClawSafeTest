<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sliding-window rate limiting: within the current 60-second window user A's seventh call exceeds the limit of six and is blocked, older calls age out of the window, and user B's calls are unaffected because windows are per user.">
  <defs>
    <style>
      .title { font: 800 22px 'Inter', -apple-system, 'Segoe UI', sans-serif; fill: #00d9ff; text-anchor: middle; }
      .lane { font: 700 13px 'Inter', -apple-system, 'Segoe UI', sans-serif; fill: #e8f0fe; }
      .note { font: 500 11.5px 'Inter', -apple-system, 'Segoe UI', sans-serif; fill: #7a8ab0; }
      .axis { stroke: #3a4555; stroke-width: 1.5; }
      .tick { font: 500 11px 'Inter', -apple-system, 'Segoe UI', sans-serif; fill: #7a8ab0; text-anchor: middle; }
      .window-label { font: 600 12px 'Inter', -apple-system, 'Segoe UI', sans-serif; fill: #00d9ff; text-anchor: middle; }
      .caption { font: 500 12px 'Inter', -apple-system, 'Segoe UI', sans-serif; fill: #a0b0d4; text-anchor: middle; }
      .blocked-label { font: 700 12px 'Inter', -apple-system, 'Segoe UI', sans-serif; fill: #ff3333; }
    </style>
  </defs>

  <rect width="900" height="420" fill="#0a0e27"/>

  <text x="450" y="38" class="title">Rate Limiting — Per-User Sliding Window</text>

  <!-- sliding window -->
  <rect x="260" y="70" width="520" height="240" rx="10" fill="#00d9ff" fill-opacity="0.06" stroke="#00d9ff" stroke-width="1.5" stroke-dasharray="8 5"/>
  <text x="520" y="94" class="window-label">current 60-second window · limit = 6 calls/min per user × tool</text>

  <!-- lane: user A -->
  <text x="70" y="150" class="lane">user-a</text>
  <line x1="140" y1="146" x2="820" y2="146" class="axis" opacity="0.4"/>
  <!-- aged-out calls -->
  <circle cx="180" cy="146" r="8" fill="#7a8ab0" fill-opacity="0.35"/>
  <circle cx="222" cy="146" r="8" fill="#7a8ab0" fill-opacity="0.35"/>
  <text x="160" y="176" class="note">aged out — no longer counted</text>
  <!-- in-window calls -->
  <circle cx="300" cy="146" r="9" fill="#00ff88"/>
  <circle cx="370" cy="146" r="9" fill="#00ff88"/>
  <circle cx="440" cy="146" r="9" fill="#00ff88"/>
  <circle cx="510" cy="146" r="9" fill="#00ff88"/>
  <circle cx="580" cy="146" r="9" fill="#00ff88"/>
  <circle cx="650" cy="146" r="9" fill="#00ff88"/>
  <!-- blocked call -->
  <circle cx="730" cy="146" r="11" fill="none" stroke="#ff3333" stroke-width="2.5"/>
  <line x1="723" y1="139" x2="737" y2="153" stroke="#ff3333" stroke-width="2.5"/>
  <line x1="737" y1="139" x2="723" y2="153" stroke="#ff3333" stroke-width="2.5"/>
  <text x="700" y="120" class="blocked-label">7th call → BLOCKED</text>

  <!-- lane: user B -->
  <text x="70" y="250" class="lane">user-b</text>
  <line x1="140" y1="246" x2="820" y2="246" class="axis" opacity="0.4"/>
  <circle cx="340" cy="246" r="9" fill="#00ff88"/>
  <circle cx="520" cy="246" r="9" fill="#00ff88"/>
  <circle cx="700" cy="246" r="9" fill="#00ff88"/>
  <text x="340" y="280" class="note">unaffected — windows are isolated per user</text>

  <!-- time axis -->
  <line x1="140" y1="330" x2="820" y2="330" class="axis" marker-end="none"/>
  <text x="260" y="352" class="tick">t − 60s</text>
  <text x="780" y="352" class="tick">now</text>
  <line x1="260" y1="324" x2="260" y2="336" class="axis"/>
  <line x1="780" y1="324" x2="780" y2="336" class="axis"/>

  <text x="450" y="396" class="caption">Timestamps age out continuously — one user flooding a tool never locks it for anyone else, and limits recover automatically.</text>
</svg>
