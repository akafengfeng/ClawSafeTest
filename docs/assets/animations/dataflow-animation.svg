<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated dataflow: an allowed tool call travels through ClawSafe's pipeline to a sanitized result while a malicious call is diverted to a blocked state; both are written to the audit trail.">
  <defs>
    <style>
      .node { fill: #1a1f3a; stroke: #3a4555; stroke-width: 1.5; }
      .node-title { font: 700 14px 'Inter', -apple-system, 'Segoe UI', sans-serif; fill: #e8f0fe; text-anchor: middle; }
      .node-sub { font: 400 10px 'Inter', -apple-system, 'Segoe UI', sans-serif; fill: #7a8ab0; text-anchor: middle; }
      .flow { stroke: #00d9ff; stroke-width: 2; stroke-dasharray: 7 7; fill: none; opacity: 0.55; animation: dash 1.1s linear infinite; }
      .flow-red { stroke: #ff3333; stroke-width: 2; stroke-dasharray: 7 7; fill: none; opacity: 0.35; animation: dash 1.1s linear infinite; }
      .drop { stroke: #7a8ab0; stroke-width: 1.2; stroke-dasharray: 2 5; fill: none; opacity: 0.6; }
      .title { font: 800 20px 'Inter', -apple-system, 'Segoe UI', sans-serif; fill: #00d9ff; text-anchor: middle; }
      .legend { font: 500 11px 'Inter', -apple-system, 'Segoe UI', sans-serif; fill: #a0b0d4; }
      .verdict-ok { font: 800 13px 'Inter', -apple-system, 'Segoe UI', sans-serif; fill: #00ff88; text-anchor: middle; }
      .verdict-bad { font: 800 13px 'Inter', -apple-system, 'Segoe UI', sans-serif; fill: #ff3333; text-anchor: middle; }
      .audit { font: 600 12px 'Inter', -apple-system, 'Segoe UI', sans-serif; fill: #a0b0d4; text-anchor: middle; }
      @keyframes dash { to { stroke-dashoffset: -14; } }
    </style>
  </defs>

  <rect width="900" height="440" fill="#0a0e27"/>

  <text x="450" y="34" class="title">Dataflow — Every Tool Call, Guarded</text>

  <!-- legend -->
  <circle cx="676" cy="62" r="5" fill="#00ff88"/>
  <text x="686" y="66" class="legend">legitimate call</text>
  <circle cx="786" cy="62" r="5" fill="#ff3333"/>
  <text x="796" y="66" class="legend">malicious call</text>

  <!-- connectors -->
  <line x1="148" y1="134" x2="772" y2="134" class="flow"/>
  <path d="M 386 158 L 386 280" class="flow-red"/>
  <path d="M 386 328 L 386 372" class="drop"/>
  <path d="M 830 158 L 830 372" class="drop"/>

  <!-- pipeline nodes -->
  <g>
    <rect x="32" y="110" width="116" height="48" rx="8" class="node" stroke="#00d9ff"/>
    <text x="90" y="130" class="node-title">Agent</text>
    <text x="90" y="146" class="node-sub">tool call request</text>
  </g>
  <g>
    <rect x="180" y="110" width="116" height="48" rx="8" class="node">
      <animate attributeName="fill-opacity" dur="12s" repeatCount="indefinite" values="1;1;0.55;1;1" keyTimes="0;0.06;0.08;0.10;1"/>
    </rect>
    <text x="238" y="130" class="node-title">Authorize</text>
    <text x="238" y="146" class="node-sub">RBAC + risk score</text>
  </g>
  <g>
    <rect x="328" y="110" width="116" height="48" rx="8" class="node">
      <animate attributeName="fill-opacity" dur="12s" repeatCount="indefinite" values="1;1;0.55;1;1;0.55;1" keyTimes="0;0.14;0.16;0.18;0.70;0.74;1"/>
    </rect>
    <text x="386" y="130" class="node-title">Validate</text>
    <text x="386" y="146" class="node-sub">injection · paths · creds</text>
  </g>
  <g>
    <rect x="476" y="110" width="116" height="48" rx="8" class="node">
      <animate attributeName="fill-opacity" dur="12s" repeatCount="indefinite" values="1;1;0.55;1;1" keyTimes="0;0.22;0.24;0.26;1"/>
    </rect>
    <text x="534" y="130" class="node-title">Rate Limit</text>
    <text x="534" y="146" class="node-sub">per-user window</text>
  </g>
  <g>
    <rect x="624" y="110" width="116" height="48" rx="8" class="node">
      <animate attributeName="fill-opacity" dur="12s" repeatCount="indefinite" values="1;1;0.55;1;1" keyTimes="0;0.30;0.32;0.34;1"/>
    </rect>
    <text x="682" y="130" class="node-title">Execute</text>
    <text x="682" y="146" class="node-sub">the real tool runs</text>
  </g>
  <g>
    <rect x="772" y="110" width="116" height="48" rx="8" class="node" stroke="#00ff88">
      <animate attributeName="fill-opacity" dur="12s" repeatCount="indefinite" values="1;1;0.5;1;1" keyTimes="0;0.38;0.41;0.45;1"/>
    </rect>
    <text x="830" y="130" class="node-title">Result</text>
    <text x="830" y="146" class="node-sub">scanned + sanitized</text>
  </g>

  <!-- allowed verdict -->
  <text x="830" y="92" class="verdict-ok" opacity="0">✓ ALLOWED
    <animate attributeName="opacity" dur="12s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.38;0.42;0.55;0.62;1"/>
  </text>

  <!-- blocked node -->
  <g>
    <rect x="316" y="280" width="140" height="48" rx="8" fill="#ff3333" fill-opacity="0.12" stroke="#ff3333" stroke-width="1.5">
      <animate attributeName="fill-opacity" dur="12s" repeatCount="indefinite" values="0.12;0.12;0.45;0.12;0.12" keyTimes="0;0.78;0.82;0.88;1"/>
    </rect>
    <text x="386" y="300" class="node-title" fill="#ff3333">BLOCKED</text>
    <text x="386" y="316" class="node-sub">SecurityBlockedError</text>
  </g>
  <text x="386" y="262" class="verdict-bad" opacity="0">✗ DENIED
    <animate attributeName="opacity" dur="12s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.78;0.82;0.92;0.98;1"/>
  </text>

  <!-- audit trail -->
  <rect x="32" y="372" width="856" height="40" rx="8" fill="#1a1f3a" stroke="#00d9ff" stroke-width="1" stroke-opacity="0.5"/>
  <text x="450" y="396" class="audit">Immutable Audit Trail — every allow and every block is recorded</text>

  <!-- allowed packet -->
  <circle r="11" fill="#00ff88" opacity="0">
    <animate attributeName="opacity" dur="12s" repeatCount="indefinite" values="0;0.25;0.25;0;0" keyTimes="0;0.02;0.38;0.42;1"/>
    <animateMotion dur="12s" repeatCount="indefinite" calcMode="linear" keyPoints="0;1;1" keyTimes="0;0.4;1" path="M 90 134 L 830 134"/>
  </circle>
  <circle r="6" fill="#00ff88" opacity="0">
    <animate attributeName="opacity" dur="12s" repeatCount="indefinite" values="0;1;1;0;0" keyTimes="0;0.02;0.38;0.42;1"/>
    <animateMotion dur="12s" repeatCount="indefinite" calcMode="linear" keyPoints="0;1;1" keyTimes="0;0.4;1" path="M 90 134 L 830 134"/>
  </circle>

  <!-- malicious packet -->
  <circle r="11" fill="#ff3333" opacity="0">
    <animate attributeName="opacity" dur="12s" repeatCount="indefinite" values="0;0;0.25;0.25;0;0" keyTimes="0;0.5;0.52;0.78;0.84;1"/>
    <animateMotion dur="12s" repeatCount="indefinite" calcMode="linear" keyPoints="0;0;1;1" keyTimes="0;0.5;0.8;1" path="M 90 134 L 386 134 L 386 296"/>
  </circle>
  <circle r="6" fill="#ff3333" opacity="0">
    <animate attributeName="opacity" dur="12s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.5;0.52;0.78;0.84;1"/>
    <animateMotion dur="12s" repeatCount="indefinite" calcMode="linear" keyPoints="0;0;1;1" keyTimes="0;0.5;0.8;1" path="M 90 134 L 386 134 L 386 296"/>
  </circle>
</svg>
