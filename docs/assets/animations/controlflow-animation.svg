<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 760 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated control flow: a tool call passes four fail-closed decision gates in sequence — authorization, whitelist, input validation, rate limit — reaching execute, while any 'no' edge leads to a blocked state and the audit trail.">
  <defs>
    <style>
      .gate { fill: #1a1f3a; stroke: #3a4555; stroke-width: 1.5; }
      .gate-label { font: 700 13px 'Inter', -apple-system, 'Segoe UI', sans-serif; fill: #e8f0fe; text-anchor: middle; }
      .gate-sub { font: 400 10px 'Inter', -apple-system, 'Segoe UI', sans-serif; fill: #7a8ab0; text-anchor: middle; }
      .edge { stroke: #00d9ff; stroke-width: 2; fill: none; marker-end: url(#arrow); opacity: 0.7; }
      .edge-no { stroke: #ff3333; stroke-width: 1.5; fill: none; marker-end: url(#arrow-red); opacity: 0.5; stroke-dasharray: 5 5; }
      .yes { font: 700 11px 'Inter', -apple-system, 'Segoe UI', sans-serif; fill: #00ff88; }
      .no { font: 700 11px 'Inter', -apple-system, 'Segoe UI', sans-serif; fill: #ff3333; }
      .title { font: 800 20px 'Inter', -apple-system, 'Segoe UI', sans-serif; fill: #00d9ff; text-anchor: middle; }
      .note { font: 500 11px 'Inter', -apple-system, 'Segoe UI', sans-serif; fill: #7a8ab0; text-anchor: middle; }

      .s1 { animation: gate-on 9s linear infinite; }
      .s2 { animation: gate-on 9s linear infinite 1.1s; }
      .s3 { animation: gate-on 9s linear infinite 2.2s; }
      .s4 { animation: gate-on 9s linear infinite 3.3s; }
      .s5 { animation: gate-on 9s linear infinite 4.4s; }
      .s6 { animation: exec-on 9s linear infinite 5.5s; }
      .s7 { animation: block-on 9s linear infinite 7.2s; }

      @keyframes gate-on {
        0%, 100% { stroke: #3a4555; }
        3%, 12%  { stroke: #00d9ff; stroke-width: 2.5; }
        18%      { stroke: #3a4555; }
      }
      @keyframes exec-on {
        0%, 100% { stroke: #3a4555; fill-opacity: 0.12; }
        3%, 14%  { stroke: #00ff88; stroke-width: 3; fill-opacity: 0.35; }
        20%      { stroke: #3a4555; fill-opacity: 0.12; }
      }
      @keyframes block-on {
        0%, 100% { stroke: #ff3333; fill-opacity: 0.10; }
        3%, 12%  { stroke: #ff3333; stroke-width: 3; fill-opacity: 0.40; }
        18%      { fill-opacity: 0.10; }
      }
    </style>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00d9ff"/>
    </marker>
    <marker id="arrow-red" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff3333"/>
    </marker>
  </defs>

  <rect width="760" height="640" fill="#0a0e27"/>

  <text x="380" y="36" class="title">Control Flow — Four Fail-Closed Gates</text>

  <!-- entry -->
  <rect x="170" y="60" width="220" height="44" rx="8" class="gate s1" stroke="#00d9ff"/>
  <text x="280" y="79" class="gate-label">Tool Call</text>
  <text x="280" y="94" class="gate-sub">guard.protect_tool_call(...)</text>

  <!-- gate 1 -->
  <line x1="280" y1="104" x2="280" y2="136" class="edge"/>
  <polygon points="280,136 400,180 280,224 160,180" class="gate s2"/>
  <text x="280" y="176" class="gate-label">Authorized?</text>
  <text x="280" y="192" class="gate-sub">RBAC · risk score · approval</text>

  <!-- gate 2 -->
  <line x1="280" y1="224" x2="280" y2="252" class="edge"/>
  <text x="290" y="244" class="yes">yes</text>
  <polygon points="280,252 400,296 280,340 160,296" class="gate s3"/>
  <text x="280" y="292" class="gate-label">Whitelisted?</text>
  <text x="280" y="308" class="gate-sub">deny-by-default registry</text>

  <!-- gate 3 -->
  <line x1="280" y1="340" x2="280" y2="368" class="edge"/>
  <text x="290" y="360" class="yes">yes</text>
  <polygon points="280,368 400,412 280,456 160,412" class="gate s4"/>
  <text x="280" y="408" class="gate-label">Input clean?</text>
  <text x="280" y="424" class="gate-sub">injection · traversal · allowed_dirs</text>

  <!-- gate 4 -->
  <line x1="280" y1="456" x2="280" y2="484" class="edge"/>
  <text x="290" y="476" class="yes">yes</text>
  <polygon points="280,484 400,528 280,572 160,528" class="gate s5"/>
  <text x="280" y="524" class="gate-label">Under limit?</text>
  <text x="280" y="540" class="gate-sub">sliding window · per user × tool</text>

  <!-- execute -->
  <line x1="400" y1="528" x2="470" y2="528" class="edge"/>
  <text x="410" y="520" class="yes">yes</text>
  <rect x="470" y="504" width="180" height="48" rx="8" fill="#00ff88" fill-opacity="0.12" class="s6"/>
  <text x="560" y="524" class="gate-label" fill="#00ff88">▶ EXECUTE</text>
  <text x="560" y="540" class="gate-sub">then output scan + redaction</text>

  <!-- blocked -->
  <path d="M 400 180 L 560 180 L 560 268" class="edge-no"/>
  <path d="M 400 296 L 560 296 L 560 268" class="edge-no"/>
  <path d="M 400 412 L 560 412 L 560 316" class="edge-no"/>
  <text x="412" y="172" class="no">no</text>
  <text x="412" y="288" class="no">no</text>
  <text x="412" y="404" class="no">no</text>

  <rect x="480" y="268" width="160" height="48" rx="8" fill="#ff3333" fill-opacity="0.10" stroke="#ff3333" stroke-width="1.5" class="s7"/>
  <text x="560" y="288" class="gate-label" fill="#ff3333">✗ BLOCKED</text>
  <text x="560" y="304" class="gate-sub">SecurityBlockedError raised</text>

  <!-- audit note -->
  <line x1="560" y1="316" x2="560" y2="400" class="edge-no" style="stroke-dasharray: 2 6; marker-end: none;"/>
  <line x1="560" y1="552" x2="560" y2="590" class="edge" style="stroke-dasharray: 2 6; marker-end: none; opacity: 0.4;"/>
  <text x="560" y="612" class="note">every verdict → immutable audit trail</text>
  <text x="614" y="404" class="note" text-anchor="start"></text>

  <text x="90" y="612" class="note" text-anchor="start">Gates never fail open — an error at any gate means the call does not run.</text>
</svg>
